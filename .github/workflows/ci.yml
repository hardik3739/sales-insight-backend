name: CI — Backend

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint, Test & Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependency (libmagic)
        run: sudo apt-get install -y libmagic1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install lint tools
        run: pip install flake8 pytest httpx

      - name: Lint with flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=.git,__pycache__,.venv \
            --count --statistics

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          GROQ_API_KEY: dummy_for_ci
          ALLOWED_ORIGINS: http://localhost:3000

      - name: Build Docker image
        run: docker build -t sales-insight-backend:ci .
